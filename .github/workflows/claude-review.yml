name: Claude Review

on:
  issue_comment:
    types:
      - created

jobs:
  check:
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "passed"
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const org = "org101org101"
            const team_slug = "anza"
            const username = context.actor

            const { data } = await github.rest.teams.getMembershipForUserInOrg({
              org,
              team_slug,
              username,
            })

            if (data.state !== "active") {
              throw new Error("not authorized")
            }
  review:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Please review this pull request focusing on the changed files.

            Note: The PR branch is already checked out in the current working directory.

            Provide feedback on:
            - Code quality and adherence to best practices
            - Potential bugs or edge cases
            - Performance considerations
            - Security implications
            - Suggestions for improvement

            Since this PR touches critical source code paths, please be thorough
            in your review and provide inline comments where appropriate.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*), Bash(gh pr diff:*), Bash(gh pr view:*)"
